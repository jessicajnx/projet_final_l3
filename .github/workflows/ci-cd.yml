name: CI-CD

on:
  push:
    branches: ["main"]

jobs:
  tests:
    name: Run backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/linuxmint75-backend:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/linuxmint75-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/linuxmint75-frontend:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/linuxmint75-frontend:${{ github.sha }}

  deploy:
    name: Deploy to Azure VM and update K3s
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Validate SSH secret format
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          if [ -z "$VM_SSH_KEY" ]; then
            echo "VM_SSH_KEY secret is missing"
            exit 1
          fi

          if ! printf '%s' "$VM_SSH_KEY" | grep -qE '-----BEGIN (OPENSSH |RSA |EC |DSA )?PRIVATE KEY-----'; then
            echo "VM_SSH_KEY does not look like a private key. Paste the full private key, not the public key or file path."
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            if [ ! -d "$HOME/projet_final_L3/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git $HOME/projet_final_L3
            fi

            cd $HOME/projet_final_L3
            git checkout main
            git pull origin main

            sudo k3s kubectl create namespace webapp --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            sudo k3s kubectl -n webapp create secret generic app-secrets \
              --from-literal=POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
              --from-literal=DB_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            sudo k3s kubectl apply -k k8s/

            sudo k3s kubectl -n webapp set image deployment/backend backend=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/linuxmint75-backend:${{ github.sha }}
            sudo k3s kubectl -n webapp set image deployment/frontend frontend=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/linuxmint75-frontend:${{ github.sha }}

            sudo k3s kubectl -n webapp rollout status deployment/backend
            sudo k3s kubectl -n webapp rollout status deployment/frontend
